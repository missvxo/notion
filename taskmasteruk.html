<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taskmaster UK Widget</title>

<!-- Poiret One only -->
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">

<style>
    body {
        background: transparent;
        color: black;
        text-align: center;
        padding: 20px;
        margin: 0;
        font-family: 'Poiret One', sans-serif;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    .episode-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 40px;
        flex-wrap: nowrap;
        margin-top: 10px;
    }

    .episode-box {
        width: 300px;
        text-align: center;
    }

    .divider {
        width: 1px;
        background-color: black;
        opacity: 0.3;
        height: 100%;
        margin-top: 20px;
    }

    h2 {
        font-size: 20px;
        margin-bottom: 10px;
        opacity: 0.9;
    }

    .episode-title {
        font-size: 20px;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
    }

    .season-ep {
        font-size: 16px;
        opacity: 0.85;
        margin-bottom: 5px;
    }

    .air-date {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 10px;
    }

    .description {
        font-size: 15px;
        opacity: 0.9;
        line-height: 1.4;
    }
</style>
</head>

<body>

    <h1>Taskmaster UK</h1>

    <div class="episode-container">

        <div class="episode-box">
            <h2>Most Recent Episode</h2>
            <div id="latest-episode">Loading...</div>
        </div>

        <div class="divider"></div>

        <div class="episode-box">
            <h2>Next Episode</h2>
            <div id="next-episode">Loading...</div>
        </div>

    </div>

<script>
async function fetchTaskmaster() {
    try {
        // Fetch show + all episodes
        const response = await fetch(
            "https://api.tvmaze.com/singlesearch/shows?q=taskmaster&embed=episodes"
        );
        const data = await response.json();

        const episodes = data._embedded.episodes;

        // Find latest aired episode
        const today = new Date();
        const pastEpisodes = episodes.filter(ep => new Date(ep.airdate) <= today);
        const latest = pastEpisodes[pastEpisodes.length - 1];

        // Find next upcoming episode
        const futureEpisodes = episodes.filter(ep => new Date(ep.airdate) > today);
        const next = futureEpisodes[0];

        /* Latest episode */
        if (latest) {
            document.getElementById("latest-episode").innerHTML = `
                <div class="episode-title">${latest.name}</div>
                <div class="season-ep">Season ${latest.season}, Episode ${latest.number}</div>
                <div class="air-date">Aired (UK): ${latest.airdate}</div>
                <div class="description">${latest.summary ? latest.summary.replace(/<[^>]+>/g, '') : "No description available."}</div>
            `;
        }

        /* Next episode */
        if (next) {
            document.getElementById("next-episode").innerHTML = `
                <div class="episode-title">${next.name}</div>
                <div class="season-ep">Season ${next.season}, Episode ${next.number}</div>
                <div class="air-date">Airs (UK): ${next.airdate}</div>
                <div class="description">${next.summary ? next.summary.replace(/<[^>]+>/g, '') : "No official description released yet."}</div>
            `;
        } else {
            document.getElementById("next-episode").innerHTML = `
                <div class="description">No upcoming episode information available.</div>
            `;
        }

    } catch (error) {
        document.getElementById("latest-episode").innerHTML = "Error loading episode data.";
        document.getElementById("next-episode").innerHTML = "";
    }
}

fetchTaskmaster();
</script>

</body>
</html>
