<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Poiret+One&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greeting2</title>

    <style>

        /*CSS RESETS*/

        body{
            background-color: #fff;
            line-height: 1.6;
        }

        }

        /*CSS START*/

        .full-table {
            display: table;
            height: 100%;
            width: 100%;
        }

        .table-cell {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }

        .card {
            padding: 10px 25px 10px 25px;
            border-radius: 10px;
            background: #ffffff;
            width: 85vw;
            color: #000000;
            display: inline-block;
            box-shadow: none;
        }

        .card:hover {
            margin-top: 2px;
            box-shadow: none;
        }

        .clock {
            display: inline;
            font-family: 'Poiret One', cursive;
            font-size: 1.5em;
        }

        .time {
            display: inline;
            min-width: 37px;
        }

        .colon {
            font-size: 1.1em;
            display: inline-block;
        }

        .date {
            display: inline;
            min-width: 162px;
            font-family: 'Poiret One', cursive;
            font-size: 1.5em;
            padding-right: 30px;
        }

        .greet{
            display:inline;
            font-family: 'Poiret One', cursive;
            font-size: 1.5rem;
            padding-right: 30px;
        }
