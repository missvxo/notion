<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grey's Anatomy Widget</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: transparent;
        color: #ffffff;
        padding: 20px;
        line-height: 1.5;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 20px;
        margin-top: 25px;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .episode-title {
        font-size: 18px;
        font-weight: bold;
        margin-top: 5px;
    }

    .air-date {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 8px;
    }

    .description {
        font-size: 15px;
        opacity: 0.9;
        max-width: 500px;
    }
</style>
</head>

<body>
    <h1>Grey's Anatomy</h1>

    <h2>Most Recent Episode:</h2>
    <div id="latest-episode">
        Loading...
    </div>

    <h2>Next Episode:</h2>
    <div id="next-episode">
        Loading...
    </div>

<script>
const apiKey = "20330d7f3c59cd44c41c12d7682481ed"; 
const showId = 1416; // TMDB ID for Grey's Anatomy

async function fetchEpisodes() {
    try {
        const response = await fetch(
            `https://api.themoviedb.org/3/tv/${showId}?api_key=${apiKey}&language=en-US`
        );
        const data = await response.json();

        const latest = data.last_episode_to_air;
        const next = data.next_episode_to_air;

        // Format latest episode
        if (latest) {
            document.getElementById("latest-episode").innerHTML = `
                <div class="episode-title">${latest.name}</div>
                <div class="air-date">${latest.air_date}</div>
                <div class="description">${latest.overview || "No description available."}</div>
            `;
        }

        // Format next episode
        if (next) {
            document.getElementById("next-episode").innerHTML = `
                <div class="episode-title">${next.name}</div>
                <div class="air-date">${next.air_date}</div>
                <div class="description">${next.overview || "No official description released yet."}</div>
            `;
        } else {
            document.getElementById("next-episode").innerHTML = `
                <div class="description">No upcoming episode information available.</div>
            `;
        }

    } catch (error) {
        document.getElementById("latest-episode").innerHTML = "Error loading episode data.";
        document.getElementById("next-episode").innerHTML = "";
    }
}

fetchEpisodes();
</script>

</body>
</html>
