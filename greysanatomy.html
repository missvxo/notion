<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grey's Anatomy Widget</title>

<!-- Poiret One only -->
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">

<style>
    body {
        background: transparent;
        color: black;
        text-align: center;
        padding: 20px;
        margin: 0;
        font-family: 'Poiret One', sans-serif;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    /* Side-by-side container */
    .episode-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 40px;
        flex-wrap: nowrap;
        margin-top: 10px;
    }

    .episode-box {
        width: 300px;
        text-align: center;
    }

    /* Vertical divider */
    .divider {
        width: 1px;
        background-color: black;
        opacity: 0.3;
        height: 100%;
        margin-top: 20px;
    }

    h2 {
        font-size: 20px;
        margin-bottom: 10px;
        opacity: 0.9;
    }

    .episode-title {
        font-size: 20px;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
    }

    .season-ep {
        font-size: 16px;
        opacity: 0.85;
        margin-bottom: 5px;
    }

    .air-date {
        font-size: 16px;
        opacity: 0.8;
        margin-bottom: 5px;
    }

    .disney-date {
        font-size: 15px;
        opacity: 0.75;
        margin-bottom: 10px;
    }

    .description {
        font-size: 15px;
        opacity: 0.9;
        line-height: 1.4;
    }
</style>
</head>

<body>

    <h1>Grey's Anatomy</h1>

    <div class="episode-container">

        <div class="episode-box">
            <h2>Most Recent Episode</h2>
            <div id="latest-episode">Loading...</div>
        </div>

        <div class="divider"></div>

        <div class="episode-box">
            <h2>Next Episode</h2>
            <div id="next-episode">Loading...</div>
        </div>

    </div>

<script>
const apiKey = "20330d7f3c59cd44c41c12d7682481ed"; 
const showId = 1416; // TMDB ID for Grey's Anatomy

function addOneDay(dateString) {
    const date = new Date(dateString);
    date.setDate(date.getDate() + 1);
    return date.toISOString().split("T")[0];
}

async function fetchEpisodes() {
    try {
        const response = await fetch(
            `https://api.themoviedb.org/3/tv/${showId}?api_key=${apiKey}&language=en-US`
        );
        const data = await response.json();

        const latest = data.last_episode_to_air;
        const next = data.next_episode_to_air;

        /* Latest episode */
        if (latest) {
            const disneyDate = addOneDay(latest.air_date);

            document.getElementById("latest-episode").innerHTML = `
                <div class="episode-title">${latest.name}</div>
                <div class="season-ep">Season ${latest.season_number}, Episode ${latest.episode_number}</div>
                <div class="air-date">Aired (US): ${latest.air_date}</div>
                <div class="disney-date">Added to Disney+ UK: ${disneyDate}</div>
                <div class="description">${latest.overview || "No description available."}</div>
            `;
        }

        /* Next episode */
        if (next) {
            const disneyDate = addOneDay(next.air_date);

            document.getElementById("next-episode").innerHTML = `
                <div class="episode-title">${next.name}</div>
                <div class="season-ep">Season ${next.season_number}, Episode ${next.episode_number}</div>
                <div class="air-date">Airs (US): ${next.air_date}</div>
                <div class="disney-date">Added to Disney+ UK: ${disneyDate}</div>
                <div class="description">${next.overview || "No official description released yet."}</div>
            `;
        } else {
            document.getElementById("next-episode").innerHTML = `
                <div class="description">No upcoming episode information available.</div>
            `;
        }

    } catch (error) {
        document.getElementById("latest-episode").innerHTML = "Error loading episode data.";
        document.getElementById("next-episode").innerHTML = "";
    }
}

fetchEpisodes();
</script>

</body>
</html>
